<!-- templates/user/shop_map.html -->
{% extends 'base.html' %}

{% block title %}店铺位置地图{% endblock %}

{% block content %}
<h2>📍 店铺位置地图</h2>
<!-- 使用iframe嵌入独立地图页面 -->
<div style="width:100%;height:800px;border:none;">
    <iframe
        src="/user/shop_map_standalone/"
        style="width:100%;height:100%;border:none;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.1);"
        frameborder="0"
        scrolling="no"
        onload="this.style.height=(this.contentWindow.document.body.scrollHeight+20)+'px';">
    </iframe>
</div>

<div style="margin-top:20px;padding:15px;background:#f9f9f9;border-radius:8px;">
    <h3 style="margin-top:0;">使用说明：</h3>
    <ul style="line-height:1.8;color:#555;">
        <li>选择区县和商圈进行筛选，地图会自动定位</li>
        <li>点击地图上的标记可以查看店铺详细信息</li>
        <li>使用鼠标滚轮缩放地图，拖动移动地图</li>
        <li>如果地图显示异常，可以<a href="/user/shop_map_standalone/" target="_blank">点击这里在新窗口打开完整地图</a></li>
    </ul>
</div>
{% endblock %}
