{% extends 'base.html' %}
{% block title %}综合数据可视化{% endblock %}
{% block content %}
    <h2>📊 综合数据可视化</h2>
    <p style="color:#666;margin:15px 0;">多维度数据图表展示，全面了解北京美食数据</p>
    
    <div class="chart-container" id="typeChart" style="margin-bottom:30px;"></div>
    
    <div class="chart-container" id="scoreChart"></div>
    
    <script>
        // 品类分布饼图
        var chart1 = echarts.init(document.getElementById('typeChart'));
        var option1 = {
            title: {
                text: '菜系类型分布（Top8）',
                left: 'center'
            },
            tooltip: {
                trigger: 'item',
                formatter: '{a} <br/>{b}: {c} ({d}%)'
            },
            legend: {
                orient: 'vertical',
                left: 'left'
            },
            series: [{
                name: '店铺数量',
                type: 'pie',
                radius: ['40%', '70%'],
                avoidLabelOverlap: false,
                itemStyle: {
                    borderRadius: 10,
                    borderColor: '#fff',
                    borderWidth: 2
                },
                label: {
                    show: false,
                    position: 'center'
                },
                emphasis: {
                    label: {
                        show: true,
                        fontSize: '20',
                        fontWeight: 'bold'
                    }
                },
                labelLine: {
                    show: false
                },
                data: [
                    {% for item in type_count %}
                    { value: {{ item.count }}, name: '{{ item.food_type }}' }{% if not forloop.last %},{% endif %}
                    {% endfor %}
                ]
            }]
        };
        chart1.setOption(option1);
        
        // 评分分布折线图
        var chart2 = echarts.init(document.getElementById('scoreChart'));
        var option2 = {
            title: {
                text: '评分分布趋势',
                left: 'center'
            },
            tooltip: {
                trigger: 'axis'
            },
            xAxis: {
                type: 'category',
                data: {{ score_list }},
                name: '评分'
            },
            yAxis: {
                type: 'value',
                name: '店铺数量'
            },
            series: [{
                name: '店铺数量',
                type: 'line',
                smooth: true,
                data: {{ score_num }},
                areaStyle: {
                    color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                        { offset: 0, color: 'rgba(26, 188, 156, 0.3)' },
                        { offset: 1, color: 'rgba(26, 188, 156, 0.1)' }
                    ])
                },
                lineStyle: {
                    color: '#1abc9c',
                    width: 3
                }
            }]
        };
        chart2.setOption(option2);
        
        window.addEventListener('resize', function() {
            chart1.resize();
            chart2.resize();
        });
    </script>
{% endblock %}
