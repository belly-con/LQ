{% extends 'base.html' %}
{% block title %}修改密码{% endblock %}
{% block content %}
    <h2>账号密码修改</h2>
    {% if msg %}
        {% if '成功' in msg %}
            <div class="msg msg-success">{{ msg }}</div>
        {% else %}
            <div class="msg msg-error">{{ msg }}</div>
        {% endif %}
    {% endif %}
    <form method="post" style="width: 450px;margin:0 auto;">
        {% csrf_token %}
        <p style="margin:20px 0;"><label style="width:100px;display:inline-block;">原密码：</label><input type="password" name="old_pwd" required style="width:100%;padding:9px;border:1px solid #ddd;border-radius:5px;font-size:14px;" placeholder="请输入当前登录密码"></p>
        <p style="margin:20px 0;"><label style="width:100px;display:inline-block;">新密码：</label><input type="password" name="new_pwd1" required style="width:100%;padding:9px;border:1px solid #ddd;border-radius:5px;font-size:14px;" placeholder="请输入新密码（至少6位）"></p>
        <p style="margin:20px 0;"><label style="width:100px;display:inline-block;">确认新密码：</label><input type="password" name="new_pwd2" required style="width:100%;padding:9px;border:1px solid #ddd;border-radius:5px;font-size:14px;" placeholder="再次输入新密码"></p>
        <button type="submit" class="btn" style="width:100%;">确认修改密码</button>
    </form>
{% endblock %}
